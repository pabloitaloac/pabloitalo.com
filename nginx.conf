server {
  listen 3000;
  listen [::]:3000;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Enforce preferred host to reduce duplicate URL variants.
  if ($host ~* ^www\.pabloitalo\.com$) {
    return 301 https://pabloitalo.com$request_uri;
  }

  # Legacy route redirect to avoid duplicate content.
  location = /home {
    return 301 /;
  }

  # Redirect old hashed resume file URLs still crawled by Google.
  location ~* ^/static/media/resume\..*\.pdf$ {
    return 301 /resume;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }

  location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|webp|woff2?)$ {
    expires 7d;
    add_header Cache-Control "public, max-age=604800, immutable";
    try_files $uri =404;
  }
}
